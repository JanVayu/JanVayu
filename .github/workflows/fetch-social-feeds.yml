name: Weekly Feed Health Check

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:       # Manual trigger available

jobs:
  check-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check feed status
        run: |
          echo "=== Checking JanVayu feed health ==="
          SITE_URL="https://www.janvayu.in"

          # Check feed-status endpoint
          echo ""
          echo "--- Feed Status ---"
          curl -sf "${SITE_URL}/.netlify/functions/feed-status" | python3 -m json.tool || echo "feed-status: unavailable"

          # Check each feed endpoint responds
          for feed in reddit-feed twitter-feed news-proxy instagram-feed youtube-feed; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}/.netlify/functions/${feed}" 2>/dev/null)
            echo "${feed}: HTTP ${HTTP}"
          done

          echo ""
          echo "--- Site Health ---"
          # Check main site responds
          MAIN=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}/" 2>/dev/null)
          echo "Main site: HTTP ${MAIN}"

          # Check blog
          BLOG=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}/blog/" 2>/dev/null)
          echo "Blog: HTTP ${BLOG}"

          # Check Ask JanVayu PWA
          ASK=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}/ask/" 2>/dev/null)
          echo "Ask JanVayu: HTTP ${ASK}"

          # Check docs
          DOCS=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}/docs/" 2>/dev/null)
          echo "Docs: HTTP ${DOCS}"

          echo ""
          echo "=== Health check complete ==="

          # Fail if main site is down
          if [ "$MAIN" != "200" ]; then
            echo "ALERT: Main site returned HTTP ${MAIN}"
            exit 1
          fi
