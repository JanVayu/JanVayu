name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Guard against accidental deletion/emptying of the main app file
  guard-index-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify index.html is not empty or gutted
        run: |
          LINES=$(wc -l < index.html)
          echo "index.html has $LINES lines"
          if [ "$LINES" -lt 100 ]; then
            echo "::error::index.html has only $LINES lines (expected ~13,000). This would take down www.janvayu.in!"
            exit 1
          fi

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --accept 200,204,301,302,403,429 --exclude-mail --exclude "localhost|127.0.0.1|example.com|twitter.com|x.com|linkedin.com|facebook.com|instagram.com|t.me|wa.me|play.google.com|apps.apple.com" --timeout 30 --max-retries 2 "**/*.html" "**/*.md"
          fail: false
