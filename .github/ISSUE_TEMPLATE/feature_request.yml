name: Feature Request
description: Suggest a new feature or enhancement for JanVayu
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please provide as much detail as possible to help us understand your idea.

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like.
      placeholder: Describe the feature you are proposing.
    validations:
      required: true

  - type: textarea
    id: problem-it-solves
    attributes:
      label: Problem It Solves
      description: What problem does this feature address? What user need does it fulfill?
      placeholder: Explain the problem or gap this feature would solve.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you envision this feature working?
      placeholder: Describe your ideal solution or implementation approach.
    validations:
      required: false

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe any alternative approaches you've thought about.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area of JanVayu does this feature relate to?
      options:
        - Dashboard
        - Social Feed
        - Maps
        - Alerts
        - Research Library
        - Policy Tracker
        - Citizen Voices
        - New Feature
        - Other
    validations:
      required: true
