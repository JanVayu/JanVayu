<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>JanVayu &middot; Terra.Do Studio collab</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    :root {
      --ink: #0F172A;
      --text-2: #334155;
      --text-3: #64748B;
      --accent: #1B6B4A;
      --bg: #FAFAF7;
      --bg-section: #FFFFFF;
      --border: #E5E7EB;
      --soft: #F1F5F9;
      --radius: 10px;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --todo: #94A3B8;
      --wip:  #F59E0B;
      --done: #1B6B4A;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--sans); background: var(--bg); color: var(--ink); line-height: 1.6; }
    a { color: var(--accent); }
    code { background: var(--soft); padding: 1px 5px; border-radius: 4px; font-size: 0.92em; }
    em { font-style: italic; }
    .gate, .content { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
    .gate { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .gate h1 { font-family: var(--serif); font-size: 1.75rem; margin: 0 0 8px; }
    .gate p { color: var(--text-2); max-width: 440px; }
    .gate form { margin-top: 24px; display: flex; gap: 8px; width: 100%; max-width: 360px; }
    .gate input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.95rem; background: var(--bg-section); color: var(--ink); }
    .gate button { padding: 10px 18px; border: 0; border-radius: var(--radius); background: var(--accent); color: #fff; font-size: 0.92rem; font-weight: 600; cursor: pointer; }
    .gate .err { color: #B91C1C; font-size: 0.85rem; margin-top: 12px; min-height: 1.2em; }
    .gate .hint { color: var(--text-3); font-size: 0.78rem; margin-top: 24px; }
    .content { display: none; }
    .eyebrow { text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.72rem; color: var(--text-3); margin: 0 0 12px; }
    .page-header h1 { font-family: var(--serif); font-size: clamp(1.75rem, 4vw, 2.5rem); margin: 0 0 16px; line-height: 1.2; }
    .lede { font-size: 1.0625rem; color: var(--text-2); }
    .page-nav { margin: 24px 0 0; display: flex; flex-wrap: wrap; gap: 8px 16px; font-size: 0.85rem; }
    .page-nav a { color: var(--text-2); text-decoration: none; border-bottom: 1px dashed var(--border); padding-bottom: 2px; }
    .page-nav a:hover { color: var(--accent); border-color: var(--accent); }

    section { margin: 56px 0; padding: 32px; background: var(--bg-section); border: 1px solid var(--border); border-radius: var(--radius); }
    section h2 { font-family: var(--serif); font-size: 1.5rem; margin: 0 0 12px; }
    .sow-meta { border-left: 3px solid var(--accent); padding-left: 16px; margin-bottom: 24px; }
    .sow-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin: 0 0 4px; font-weight: 700; }
    .sow-meta h2 { font-family: var(--serif); font-size: 1.6rem; margin: 0 0 6px; }
    .sow-title { font-size: 1.0625rem; color: var(--text-2); margin: 0 0 14px; }
    .sow-facts { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: var(--text-2); }
    .sow-facts li { padding: 2px 0; }
    .sow h3 { font-size: 1.05rem; margin: 32px 0 8px; color: var(--ink); }
    .sow > p { color: var(--text-2); }
    .sow ul { padding-left: 22px; }
    .sow li { margin: 4px 0; }
    .deliverable { background: var(--soft); padding: 10px 14px; border-radius: 6px; font-size: 0.9rem; margin: 12px 0 0; }
    .norms-lede, .tracker-lede, .deliver-lede, .activity-lede { color: var(--text-2); margin: 0 0 16px; }

    .who-row { display: flex; align-items: center; gap: 10px; margin: 0 0 14px; font-size: 0.85rem; color: var(--text-2); flex-wrap: wrap; }
    .who-row input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); font-size: 0.85rem; color: var(--ink); min-width: 180px; }
    .tracker-status { font-size: 0.78rem; color: var(--text-3); margin: 0 0 10px; min-height: 1em; }
    .tracker-grid { overflow-x: auto; }
    .tracker-grid table { width: 100%; border-collapse: collapse; font-size: 0.86rem; min-width: 580px; }
    .tracker-grid th, .tracker-grid td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; vertical-align: top; }
    .tracker-grid th { background: #F8FAFC; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-2); }
    .tracker-grid td.wk { width: 36px; text-align: center; color: var(--text-3); font-variant-numeric: tabular-nums; }
    .tracker-grid td.task { font-size: 0.86rem; }
    .tracker-grid td.task .label { font-weight: 600; color: var(--ink); }
    .tracker-grid .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; border: 0; color: #fff; font-weight: 600; }
    .pill.todo { background: var(--todo); }
    .pill.wip  { background: var(--wip); }
    .pill.done { background: var(--done); }
    .tracker-grid .note-input { width: 100%; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); font-size: 0.8rem; color: var(--ink); margin-top: 4px; font-family: inherit; resize: vertical; min-height: 28px; }
    .tracker-grid .meta { font-size: 0.7rem; color: var(--text-3); margin-top: 4px; }

    .deliver-form label { display: flex; flex-direction: column; gap: 4px; font-size: 0.78rem; font-weight: 600; color: var(--text-2); margin-bottom: 12px; }
    .deliver-form input, .deliver-form select, .deliver-form textarea { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--ink); font-size: 0.9rem; font-family: inherit; }
    .deliver-form .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) { .deliver-form .row-2 { grid-template-columns: 1fr; } }
    .form-actions { display: flex; gap: 12px; align-items: center; margin-top: 6px; }
    .form-actions button { padding: 8px 18px; border: 0; border-radius: 6px; background: var(--accent); color: #fff; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
    .form-actions button:disabled { opacity: 0.6; cursor: wait; }
    .form-status { font-size: 0.8rem; color: var(--text-3); }
    .form-status.ok { color: var(--done); }
    .form-status.err { color: #B91C1C; }

    .activity-list { list-style: none; padding: 0; margin: 0; }
    .activity-list li { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--text-2); }
    .activity-list li:last-child { border-bottom: 0; }
    .activity-list .at { color: var(--text-3); font-size: 0.78rem; margin-left: 6px; }
    .activity-list .empty { color: var(--text-3); font-style: italic; }

    .page-footer { background: transparent; border: 0; padding: 24px 0; margin: 64px 0 32px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-3); }
    .version { font-family: var(--sans); margin-top: 4px; opacity: 0.7; }
  </style>
</head>

    // ── Decryption ──
    async function decrypt(password) {
      const bin = Uint8Array.from(atob(BLOB), c => c.charCodeAt(0));
      const salt = bin.slice(0, 16);
      const iv = bin.slice(16, 28);
      const tag = bin.slice(28, 44);
      const ct = bin.slice(44);
      const ctTag = new Uint8Array(ct.length + tag.length);
      ctTag.set(ct); ctTag.set(tag, ct.length);
      const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' }, km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ctTag);
      return new TextDecoder().decode(plain);
    }

    async function apiPost(body) {
      const r = await fetch(API, { method: "POST", headers: authHeaders(), body: JSON.stringify(body) });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.error || ("HTTP " + r.status));
      return j;
    }

    // ── Tracker rendering ──
    function fmtAt(iso) {
      if (!iso) return "";
      try {
        const d = new Date(iso);
        const now = Date.now();
        const diff = (now - d.getTime()) / 1000;
        if (diff < 60) return "just now";
        if (diff < 3600) return Math.floor(diff/60) + "m ago";
        if (diff < 86400) return Math.floor(diff/3600) + "h ago";
        if (diff < 86400*7) return Math.floor(diff/86400) + "d ago";
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      } catch { return ""; }
    }

    function renderCell(t) {
      const s = (STATE.tasks && STATE.tasks[t.id]) || { status: "todo", note: "", by: "", at: "" };
      const status = s.status || "todo";
      const note = (s.note || "").replace(/"/g, "&quot;");
      const meta = s.at ? `${s.by ? s.by + ' &middot; ' : ''}${fmtAt(s.at)}` : "";
      return `
        <div class="task" data-id="${t.id}">
          <div class="label">${t.label}</div>
          <button class="pill ${status}" data-id="${t.id}" data-status="${status}">${STATUS_LABEL[status]}</button>
          <textarea class="note-input" data-id="${t.id}" placeholder="Note (optional)" rows="1">${note}</textarea>
          <div class="meta">${meta || '&nbsp;'}</div>
        </div>
      `;
    }
    function renderTracker() {
      const rows = TRACKER_ROWS.map(r => `
        <tr>
          <td class="wk">${r.wk}</td>
          <td class="task">${renderCell(r.s1)}</td>
          <td class="task">${renderCell(r.s2)}</td>
        </tr>
      `).join("");
      const grid = document.getElementById("tracker-grid");
      grid.innerHTML = `
        <table>
          <thead>
            <tr><th>Wk</th><th>SOW 1 &mdash; Ask JanVayu</th><th>SOW 2 &mdash; Ward reports</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
      // Wire up handlers.
      grid.querySelectorAll(".pill").forEach(b => b.addEventListener("click", onPillClick));
      grid.querySelectorAll(".note-input").forEach(t => {
        t.addEventListener("blur", onNoteBlur);
        t.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); t.blur(); } });
      });
    }
    function renderActivity() {
      const ul = document.getElementById("activity-list");
      const log = STATE.log || [];
      if (!log.length) {
        ul.innerHTML = '<li class="empty">No activity yet &mdash; the first move shows up here.</li>';
        return;
      }
      ul.innerHTML = log.slice(0, 50).map(e => {
        const who = e.by ? `<strong>${escape(e.by)}</strong>` : "<em>someone</em>";
        if (e.type === "task") {
          return `<li>${who} marked <strong>SOW ${e.taskId.charAt(1)} / Wk ${e.taskId.slice(3)}</strong> &mdash; <em>${escape(e.label || '')}</em> &mdash; <strong>${STATUS_LABEL[e.status] || e.status}</strong><span class="at">${fmtAt(e.at)}</span></li>`;
        }
        if (e.type === "deliverable") {
          return `<li>${who} dropped a deliverable: <strong>SOW ${e.sow} / Phase ${e.phase}</strong> &mdash; ${escape(e.title)}<span class="at">${fmtAt(e.at)}</span></li>`;
        }
        return "";
      }).join("");
    }
    function escape(s) { return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    // ── Tracker actions ──
    function setTrackerStatus(msg, kind) {
      const el = document.getElementById("tracker-status");
      el.textContent = msg || "";
      el.style.color = kind === "err" ? "#B91C1C" : (kind === "ok" ? "var(--done)" : "var(--text-3)");
    }
    async function onPillClick(e) {
      const btn = e.currentTarget;
      const id = btn.dataset.id;
      const cur = btn.dataset.status || "todo";
      const next = STATUS_ORDER[(STATUS_ORDER.indexOf(cur) + 1) % STATUS_ORDER.length];
      const note = (document.querySelector(`textarea[data-id="${id}"]`) || {}).value || "";
      const by = (document.getElementById("display-name") || {}).value || "";
      btn.disabled = true;
      setTrackerStatus("Saving…");
      try {
        const r = await apiPost({ action: "task", taskId: id, status: next, note, by });
        STATE = r.state;
        renderTracker(); renderActivity();
        setTrackerStatus("Saved", "ok");
      } catch (err) {
        setTrackerStatus("Couldn't save: " + err.message, "err");
      } finally { btn.disabled = false; }
    }
    async function onNoteBlur(e) {
      const t = e.currentTarget;
      const id = t.dataset.id;
      const cur = STATE.tasks && STATE.tasks[id];
      const status = (cur && cur.status) || "todo";
      const note = t.value || "";
      if ((cur && cur.note) === note) return; // no-op
      const by = (document.getElementById("display-name") || {}).value || "";
      setTrackerStatus("Saving note…");
      try {
        const r = await apiPost({ action: "task", taskId: id, status, note, by });
        STATE = r.state;
        renderTracker(); renderActivity();
        setTrackerStatus("Saved", "ok");
      } catch (err) {
        setTrackerStatus("Couldn't save: " + err.message, "err");
      }
    }

    // ── Deliverable form ──
    function wireDeliverForm() {
      const form = document.getElementById("deliver-form");
      const status = document.getElementById("deliver-status");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        data.action = "deliverable";
        data.sow = Number(data.sow);
        data.phase = Number(data.phase);
        data.by = (document.getElementById("display-name") || {}).value || "";
        const btn = form.querySelector("button[type=submit]");
        btn.disabled = true;
        status.className = "form-status";
        status.textContent = "Submitting…";
        try {
          const r = await apiPost(data);
          STATE = r.state;
          renderActivity();
          form.reset();
          status.className = "form-status ok";
          status.textContent = "Submitted. Varna will see it on email.";
        } catch (err) {
          status.className = "form-status err";
          status.textContent = "Couldn't submit: " + err.message;
        } finally { btn.disabled = false; }
      });
    }
    function wireDisplayName() {
      const inp = document.getElementById("display-name");
      const cached = sessionStorage.getItem("terra-collab-name") || "";
      if (cached) inp.value = cached;
      inp.addEventListener("input", () => sessionStorage.setItem("terra-collab-name", inp.value));
    }

    // ── Unlock flow ──
    async function tryUnlock(password, persist) {
      const err = document.getElementById('err');
      try {
        const html = await decrypt(password);
        SECRET = password;
        const content = document.getElementById('content');
        content.innerHTML = html;
        document.getElementById('gate').style.display = 'none';
        content.style.display = 'block';
        if (persist) sessionStorage.setItem('terra-collab-pw', password);
        // Hydrate state from API.
        try {
          STATE = await apiGet();
        } catch (e) {
          setTrackerStatus("Couldn't load shared state: " + e.message + ". You can still read the SOWs.", "err");
        }
        renderTracker();
        renderActivity();
        wireDeliverForm();
        wireDisplayName();
        if (location.hash) {
          const t = document.querySelector(location.hash);
          if (t) t.scrollIntoView();
        }
      } catch (e) {
        err.textContent = 'Wrong password.';
        if (persist) sessionStorage.removeItem('terra-collab-pw');
      }
    }

    document.getElementById('gate-form').addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('err').textContent = '';
      tryUnlock(document.getElementById('pw').value, true);
    });
    const cached = sessionStorage.getItem('terra-collab-pw');
    if (cached) tryUnlock(cached, false);
  </script>
</body>
</html>
