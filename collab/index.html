<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>JanVayu &middot; Collaborator workspace</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    :root {
      --ink: #0F172A;
      --text-2: #334155;
      --text-3: #64748B;
      --accent: #1B6B4A;
      --bg: #FAFAF7;
      --bg-section: #FFFFFF;
      --border: #E5E7EB;
      --radius: 10px;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--sans); background: var(--bg); color: var(--ink); line-height: 1.6; }
    a { color: var(--accent); }
    code { background: #F1F5F9; padding: 1px 5px; border-radius: 4px; font-size: 0.92em; }
    .gate, .content { max-width: 820px; margin: 0 auto; padding: 48px 24px; }
    .gate { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .gate h1 { font-family: var(--serif); font-size: 1.75rem; margin: 0 0 8px; }
    .gate p { color: var(--text-2); max-width: 420px; }
    .gate form { margin-top: 24px; display: flex; gap: 8px; width: 100%; max-width: 360px; }
    .gate input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.95rem; background: var(--bg-section); color: var(--ink); }
    .gate button { padding: 10px 18px; border: 0; border-radius: var(--radius); background: var(--accent); color: #fff; font-size: 0.92rem; font-weight: 600; cursor: pointer; }
    .gate .err { color: #B91C1C; font-size: 0.85rem; margin-top: 12px; min-height: 1.2em; }
    .gate .hint { color: var(--text-3); font-size: 0.78rem; margin-top: 24px; }
    .content { display: none; }
    .eyebrow { text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.72rem; color: var(--text-3); margin: 0 0 12px; }
    .page-header h1 { font-family: var(--serif); font-size: clamp(1.75rem, 4vw, 2.5rem); margin: 0 0 16px; line-height: 1.2; }
    .lede { font-size: 1.0625rem; color: var(--text-2); }
    .page-nav { margin: 24px 0 0; display: flex; flex-wrap: wrap; gap: 8px 16px; font-size: 0.85rem; }
    .page-nav a { color: var(--text-2); text-decoration: none; border-bottom: 1px dashed var(--border); padding-bottom: 2px; }
    .page-nav a:hover { color: var(--accent); border-color: var(--accent); }
    .sow, .shared-norms, .gantt { margin: 56px 0; padding: 32px; background: var(--bg-section); border: 1px solid var(--border); border-radius: var(--radius); }
    .sow-meta { border-left: 3px solid var(--accent); padding-left: 16px; margin-bottom: 24px; }
    .sow-meta h2 { font-family: var(--serif); font-size: 1.5rem; margin: 0 0 4px; }
    .sow-title { font-size: 1.05rem; color: var(--text-2); margin: 0 0 12px; font-style: italic; }
    .sow-facts { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: var(--text-2); }
    .sow-facts li { padding: 2px 0; }
    .sow h3 { font-size: 1.05rem; margin: 32px 0 8px; color: var(--ink); }
    .sow ul { padding-left: 22px; }
    .sow li { margin: 4px 0; }
    .deliverable { background: #F1F5F9; padding: 10px 14px; border-radius: 6px; font-size: 0.9rem; margin: 12px 0 0; }
    .shared-norms h2, .gantt h2 { font-family: var(--serif); font-size: 1.4rem; margin: 0 0 16px; }
    .gantt table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .gantt th, .gantt td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; vertical-align: top; }
    .gantt th { background: #F8FAFC; font-weight: 600; }
    .gantt td:first-child { width: 40px; text-align: center; color: var(--text-3); font-variant-numeric: tabular-nums; }
    .footnote { font-size: 0.8rem; color: var(--text-3); margin-top: 12px; font-style: italic; }
    .page-footer { margin: 64px 0 32px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-3); }
    .version { font-family: var(--sans); margin-top: 4px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <h1>JanVayu collaborator workspace</h1>
    <p>This page contains draft Scopes of Work shared with two collaborators. Enter the password Varna shared with you.</p>
    <form id="gate-form">
      <input type="password" id="pw" autocomplete="current-password" placeholder="Password" autofocus required>
      <button type="submit">Unlock</button>
    </form>
    <div class="err" id="err" role="alert" aria-live="polite"></div>
    <p class="hint">If you don&rsquo;t have the password, this page isn&rsquo;t for you. <a href="/">Back to JanVayu</a>.</p>
  </div>

    async function unlock(password) {
      const bin = Uint8Array.from(atob(BLOB), c => c.charCodeAt(0));
      const salt = bin.slice(0, 16);
      const iv = bin.slice(16, 28);
      const tag = bin.slice(28, 44);
      const ct = bin.slice(44);
      const ctTag = new Uint8Array(ct.length + tag.length);
      ctTag.set(ct); ctTag.set(tag, ct.length);

      const km = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password),
        { name: 'PBKDF2' }, false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
        km,
        { name: 'AES-GCM', length: 256 },
        false, ['decrypt']
      );
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ctTag);
      return new TextDecoder().decode(plain);
    }

    const form = document.getElementById('gate-form');
    const pw = document.getElementById('pw');
    const err = document.getElementById('err');
    const gate = document.getElementById('gate');
    const content = document.getElementById('content');

    async function tryUnlock(password, persist) {
      try {
        const html = await unlock(password);
        content.innerHTML = html;
        gate.style.display = 'none';
        content.style.display = 'block';
        if (persist) sessionStorage.setItem('janvayu-collab-pw', password);
        if (location.hash) {
          const t = document.querySelector(location.hash);
          if (t) t.scrollIntoView();
        }
      } catch (e) {
        err.textContent = 'Wrong password.';
        if (persist) sessionStorage.removeItem('janvayu-collab-pw');
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      err.textContent = '';
      tryUnlock(pw.value, true);
    });

    const cached = sessionStorage.getItem('janvayu-collab-pw');
    if (cached) tryUnlock(cached, false);
  </script>
