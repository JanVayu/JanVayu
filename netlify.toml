[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Embeddable widgets — allow iframing from any origin, deliberately.
[[headers]]
  for = "/embed/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
    Access-Control-Allow-Origin = "*"

# Service worker must serve from root scope with correct content-type
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

# Redirect non-www to www (canonical domain)
[[redirects]]
  from = "https://janvayu.in/*"
  to = "https://www.janvayu.in/:splat"
  status = 301
  force = true

# Ensure robots.txt and sitemap.xml are served directly (not caught by SPA fallback)
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# Serve Docsify docs site (force = true to override SPA fallback)
[[redirects]]
  from = "/docs"
  to = "/docs/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/docs/"
  to = "/docs/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/docs/*"
  to = "/docs/:splat"
  status = 200
  force = true

